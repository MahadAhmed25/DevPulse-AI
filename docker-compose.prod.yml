version: "3.9"

# Production — postgres on RDS, redis in Docker on EC2.
# All secrets injected via .env.prod. Images pulled from Amazon ECR.

services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  api:
    image: ${ECR_REGISTRY}/devpulse:${IMAGE_TAG:-latest}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "8000:8000"
    depends_on:
      - redis
    env_file:
      - .env.prod
    environment:
      ENVIRONMENT: production
      ECR_REGISTRY: ${ECR_REGISTRY}
      IMAGE_TAG: ${IMAGE_TAG:-latest}
    restart: always
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:-us-east-1}
        awslogs-group: /devpulse/api
        awslogs-stream: api

  worker:
    image: ${ECR_REGISTRY}/devpulse-worker:${IMAGE_TAG:-latest}
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=reviews,indexing
    depends_on:
      - redis
    env_file:
      - .env.prod
    environment:
      ENVIRONMENT: production
    restart: always
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:-us-east-1}
        awslogs-group: /devpulse/worker
        awslogs-stream: worker
